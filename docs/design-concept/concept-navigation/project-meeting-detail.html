<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Detail — Kabanchik</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Transcript */
    .transcript-list { display: flex; flex-direction: column; gap: 10px; }
    .transcript-row {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: #fafaf9;
    }
    .transcript-row:hover { background: #f5f5f4; }
    .transcript-time {
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 38px;
    }
    .transcript-speaker {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      min-width: 68px;
      color: var(--text-primary);
    }
    .transcript-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Action items */
    .action-item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: white;
      margin-bottom: 8px;
    }
    .action-item-row.done-item { opacity: 0.65; }
    .action-item-body { flex: 1; min-width: 0; }
    .action-item-owner {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }
    .action-item-text {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .action-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .due-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f5f5f4;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .jira-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-hover);
      border: 1px solid var(--accent-light);
      font-family: var(--font-mono, monospace);
      font-weight: 600;
    }

    /* Decisions */
    .decision-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: white;
      margin-bottom: 8px;
    }
    .decision-text {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Update card in detail */
    .update-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: white;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .update-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      flex-wrap: wrap;
    }
    .update-card-body {
      padding: 0 16px 12px;
    }
    .update-target-icon { font-size: 16px; line-height: 1; }
    .update-obj-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .update-type-label {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-hover);
      font-weight: 500;
    }
    .update-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    /* Linked resources */
    .linked-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fafaf9;
      margin-bottom: 6px;
      font-size: 13px;
    }

    /* Status-based message */
    .status-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      text-align: center;
    }
    .status-message .icon { font-size: 36px; margin-bottom: 12px; }
    .status-message h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .status-message p { font-size: 13px; color: var(--text-secondary); max-width: 320px; }

    /* Summary section */
    .summary-body { font-size: 14px; line-height: 1.7; color: var(--text-primary); }
    .summary-body p { margin-bottom: 8px; }

    /* Meeting header card */
    .meeting-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .meeting-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .meeting-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .section-label:first-child { margin-top: 0; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="content">
    <div class="content-inner" id="main-content">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- Link to Jira Dialog -->
<div class="dialog-overlay" id="link-jira-dialog">
  <div class="dialog">
    <div class="dialog-header">Link to Jira Issue</div>
    <div class="dialog-body">
      <div class="form-group">
        <label class="form-label">Jira Issue Key</label>
        <input type="text" id="jira-key-input" class="form-input" placeholder="e.g. PLAT-123">
        <div class="form-hint">Enter the Jira issue key to link this action item.</div>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeDialog('link-jira-dialog')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="link-jira-confirm-btn">Link</button>
    </div>
  </div>
</div>

<script src="js/mock-data.js"></script>
<script src="js/app.js"></script>
<script src="js/nav.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const meetingId = getUrlParam('id') || 'm1';
  const meeting = getMeetingById(meetingId);

  // Mutable local copy of action items so link-to-jira can update in place
  let actionItems = meeting ? meeting.actionItems.map(a => Object.assign({}, a)) : [];

  // Track which action item we're linking
  let linkTargetId = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function isFullyProcessed(m) {
    return m && m.status === 'done';
  }

  function statusMessage(m) {
    if (!m) return null;
    if (m.status === 'processing') {
      return { icon: '⏳', title: 'Meeting is being processed', body: 'Transcript and analysis will be available once processing completes. Please check back shortly.' };
    }
    if (m.status === 'pending') {
      return { icon: '🕐', title: 'Analysis pending', body: 'This meeting is queued for processing. The agent will pick it up soon.' };
    }
    if (m.status === 'error') {
      return { icon: '❌', title: 'Processing failed', body: 'An error occurred while processing this meeting. You can retry from the Meetings list.' };
    }
    return null;
  }

  function renderStatusMessage(m) {
    const msg = statusMessage(m);
    if (!msg) return '';
    return `
      <div class="status-message">
        <div class="icon">${msg.icon}</div>
        <h3>${msg.title}</h3>
        <p>${msg.body}</p>
      </div>
    `;
  }

  // ── Tab: Summary ───────────────────────────────────────────────────────────
  function renderTabSummary(m) {
    const msg = statusMessage(m);
    if (msg) return renderStatusMessage(m);

    const summaryHtml = m.summary
      ? `<div class="summary-body"><p>${renderMarkdown(m.summary)}</p></div>`
      : '<p style="color:var(--text-muted);font-size:13px">No summary available.</p>';

    const jiraHtml = m.jiraIssues && m.jiraIssues.length > 0 ? `
      <div class="section-label">Linked Jira Issues</div>
      ${m.jiraIssues.map(issue => `
        <div class="linked-row">
          <span style="font-family:monospace;font-weight:600;color:var(--accent)">${escapeHtml(issue.key)}</span>
          <span style="flex:1;color:var(--text-primary)">${escapeHtml(issue.title)}</span>
          ${statusBadge(issue.status)}
        </div>
      `).join('')}
    ` : '';

    const notionHtml = m.notionPages && m.notionPages.length > 0 ? `
      <div class="section-label">Linked Notion Pages</div>
      ${m.notionPages.map(page => `
        <div class="linked-row">
          <span style="font-size:16px">${page.icon}</span>
          <span style="font-size:13px;color:var(--text-primary)">${escapeHtml(page.title)}</span>
        </div>
      `).join('')}
    ` : '';

    return summaryHtml + jiraHtml + notionHtml;
  }

  // ── Tab: Transcript ────────────────────────────────────────────────────────
  function renderTabTranscript(m) {
    const msg = statusMessage(m);
    if (msg) return renderStatusMessage(m);

    if (!m.transcript || m.transcript.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">📄</div><h3>No transcript</h3><p>No transcript was captured for this meeting.</p></div>`;
    }

    return `
      <div style="margin-bottom:12px">
        <input type="text" class="search-input" id="transcript-search" placeholder="Search transcript…" oninput="filterTranscript()" style="width:100%;max-width:400px">
      </div>
      <div class="transcript-list" id="transcript-list">
        ${m.transcript.map(u => `
          <div class="transcript-row" data-text="${escapeAttr(u.speaker + ' ' + u.text)}">
            <span class="transcript-time">${escapeHtml(u.time)}</span>
            <span class="transcript-speaker">${escapeHtml(u.speaker)}</span>
            <span class="transcript-text">${escapeHtml(u.text)}</span>
          </div>
        `).join('')}
      </div>
      <div id="transcript-empty" class="empty-state" style="display:none">
        <div class="empty-icon">🔍</div>
        <h3>No results</h3>
        <p>No transcript lines match your search.</p>
      </div>
    `;
  }

  function filterTranscript() {
    const q = document.getElementById('transcript-search').value.toLowerCase();
    const rows = document.querySelectorAll('#transcript-list .transcript-row');
    let visible = 0;
    rows.forEach(row => {
      const match = row.dataset.text.toLowerCase().includes(q);
      row.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    const emptyEl = document.getElementById('transcript-empty');
    if (emptyEl) emptyEl.style.display = visible === 0 ? 'block' : 'none';
  }

  // ── Tab: Action Items ──────────────────────────────────────────────────────
  function renderActionItemsList() {
    if (actionItems.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">✅</div><h3>No action items</h3><p>No action items were captured for this meeting.</p></div>`;
    }
    return actionItems.map(item => {
      const owner = getParticipant(item.owner);
      const avatarHtml = renderAvatar(item.owner, 28);
      const linkBtn = !item.jiraKey
        ? `<button class="btn btn-ghost btn-sm" onclick="openLinkJiraDialog('${item.id}')" style="font-size:11px;padding:3px 8px">🔗 Link to Jira</button>`
        : '';
      return `
        <div class="action-item-row ${item.status === 'done' ? 'done-item' : ''}" id="action-item-${item.id}">
          ${avatarHtml}
          <div class="action-item-body">
            <div class="action-item-owner">${escapeHtml(owner.name)}</div>
            <div class="action-item-text">${escapeHtml(item.text)}</div>
            <div class="action-item-meta">
              <span class="due-chip">Due ${escapeHtml(item.due)}</span>
              ${statusBadge(item.status)}
              ${item.jiraKey ? `<span class="jira-chip">${escapeHtml(item.jiraKey)}</span>` : ''}
              ${linkBtn}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderTabActionItems(m) {
    const msg = statusMessage(m);
    if (msg) return renderStatusMessage(m);
    return `<div id="action-items-list">${renderActionItemsList()}</div>`;
  }

  function openLinkJiraDialog(itemId) {
    linkTargetId = itemId;
    document.getElementById('jira-key-input').value = '';
    openDialog('link-jira-dialog');
  }

  function confirmLinkJira() {
    const key = document.getElementById('jira-key-input').value.trim();
    if (!key) return;
    const item = actionItems.find(a => a.id === linkTargetId);
    if (item) {
      item.jiraKey = key;
      document.getElementById('action-items-list').innerHTML = renderActionItemsList();
    }
    closeDialog('link-jira-dialog');
    linkTargetId = null;
  }

  // ── Tab: Decisions ─────────────────────────────────────────────────────────
  function renderTabDecisions(m) {
    const msg = statusMessage(m);
    if (msg) return renderStatusMessage(m);

    if (!m.decisions || m.decisions.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">🧭</div><h3>No decisions recorded</h3><p>No decisions were captured for this meeting.</p></div>`;
    }
    return m.decisions.map(d => `
      <div class="decision-row">
        <span style="font-size:18px;line-height:1;padding-top:1px">•</span>
        <span class="decision-text">${escapeHtml(d.text)}</span>
        ${confidenceBadge(d.confidence)}
      </div>
    `).join('');
  }

  // ── Tab: Updates ───────────────────────────────────────────────────────────
  // Local mutable updates for this meeting
  let meetingUpdates = getUpdatesForMeeting(meetingId).map(u => Object.assign({}, u));

  function renderUpdateCard(u) {
    const targetIcon = u.target === 'jira' ? '🔵' : '📋';
    const diffHtml = u.before || u.after ? `
      <div class="diff-view" style="margin-top:10px">
        <div class="diff-col before">
          <div class="diff-label">Before</div>
          <div class="diff-text">${escapeHtml(u.before) || '<em style="opacity:0.5">empty</em>'}</div>
        </div>
        <div class="diff-col after">
          <div class="diff-label">After</div>
          <div class="diff-text">${escapeHtml(u.after) || '<em style="opacity:0.5">empty</em>'}</div>
        </div>
      </div>
    ` : '';

    const actionButtons = u.status === 'pending' ? `
      <button class="btn btn-success btn-sm" onclick="approveUpdate('${u.id}')">Approve</button>
      <button class="btn btn-ghost btn-sm" onclick="rejectUpdate('${u.id}')">Reject</button>
    ` : updateStatusBadge(u.status);

    return `
      <div class="update-card" id="update-card-${u.id}">
        <div class="update-card-header">
          <span class="update-target-icon">${targetIcon}</span>
          <span class="update-obj-name">${escapeHtml(u.objectName)}</span>
          <span class="update-type-label">${escapeHtml(u.updateType)}</span>
          ${confidenceBadge(u.confidence)}
          <div class="update-actions">${actionButtons}</div>
        </div>
        <div class="update-card-body">
          ${diffHtml}
          <div style="margin-top:8px">
            <button class="accordion-btn" onclick="toggleAccordion(this)">
              <span class="chevron">▼</span> Agent reasoning
            </button>
            <div class="accordion-content">
              <p style="font-size:12px;color:var(--text-secondary);padding:8px 12px;background:#fafaf9;border-radius:var(--radius);margin-top:4px">${escapeHtml(u.reasoning)}</p>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderTabUpdates(m) {
    const msg = statusMessage(m);
    if (msg) return renderStatusMessage(m);

    if (meetingUpdates.length === 0) {
      return `<div class="empty-state"><div class="empty-icon">📝</div><h3>No updates proposed</h3><p>The agent did not propose any updates for this meeting.</p></div>`;
    }
    return `<div id="meeting-updates-list">${meetingUpdates.map(renderUpdateCard).join('')}</div>`;
  }

  function approveUpdate(id) {
    const u = meetingUpdates.find(x => x.id === id);
    if (u) { u.status = 'approved'; rerenderUpdateCard(u); }
  }

  function rejectUpdate(id) {
    const u = meetingUpdates.find(x => x.id === id);
    if (u) { u.status = 'rejected'; rerenderUpdateCard(u); }
  }

  function rerenderUpdateCard(u) {
    const el = document.getElementById('update-card-' + u.id);
    if (el) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderUpdateCard(u);
      el.replaceWith(tmp.firstElementChild);
    }
  }

  // ── Main render ────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escapeAttr(str) {
    return escapeHtml(str).replace(/'/g,'&#39;');
  }

  function renderPage() {
    const main = document.getElementById('main-content');

    if (!meeting) {
      main.innerHTML = `
        <div style="margin-bottom:16px">
          <a href="project-meetings.html" style="font-size:13px;color:var(--accent);display:inline-flex;align-items:center;gap:4px">← Meetings</a>
        </div>
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>Meeting not found</h3>
          <p>The meeting you're looking for doesn't exist.</p>
        </div>
      `;
      return;
    }

    const participants = renderAvatarGroup(meeting.participants);
    const updatesForMeeting = getUpdatesForMeeting(meetingId);
    const pendingCount = updatesForMeeting.filter(u => u.status === 'pending').length;

    main.innerHTML = `
      <!-- Back link -->
      <div style="margin-bottom:16px">
        <a href="project-meetings.html" style="font-size:13px;color:var(--accent);display:inline-flex;align-items:center;gap:4px">← Meetings</a>
      </div>

      <!-- Header card -->
      <div class="card mb-24" style="margin-bottom:24px">
        <div class="card-body">
          <div class="meeting-title-row">
            <h1 style="font-size:20px;font-weight:700;color:var(--text-primary);flex:1">${escapeHtml(meeting.title)}</h1>
            ${statusBadge(meeting.status)}
          </div>
          <div class="meeting-meta">
            <div class="meeting-meta-item">📅 <span>${escapeHtml(meeting.date)}</span></div>
            <div class="meeting-meta-item">🕐 <span>${escapeHtml(meeting.time)}</span></div>
            <div class="meeting-meta-item">⏱ <span>${escapeHtml(meeting.duration)}</span></div>
            <div class="meeting-meta-item">${participants}</div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-container">
        <div class="tabs">
          <button class="tab-btn active">Summary</button>
          <button class="tab-btn">Transcript</button>
          <button class="tab-btn">Action Items</button>
          <button class="tab-btn">Decisions</button>
          <button class="tab-btn">
            Updates
            ${pendingCount > 0 ? `<span style="margin-left:5px;background:var(--accent);color:white;font-size:10px;font-weight:600;padding:1px 5px;border-radius:999px">${pendingCount}</span>` : ''}
          </button>
        </div>

        <div class="tab-panel active" id="tab-summary">
          ${renderTabSummary(meeting)}
        </div>

        <div class="tab-panel" id="tab-transcript">
          ${renderTabTranscript(meeting)}
        </div>

        <div class="tab-panel" id="tab-action-items">
          ${renderTabActionItems(meeting)}
        </div>

        <div class="tab-panel" id="tab-decisions">
          ${renderTabDecisions(meeting)}
        </div>

        <div class="tab-panel" id="tab-updates">
          ${renderTabUpdates(meeting)}
        </div>
      </div>
    `;

    // Init tabs
    initTabs(document.querySelector('.tabs-container'));
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  mountNav('meetings');
  renderPage();

  // Wire up the Link to Jira confirm button
  document.getElementById('link-jira-confirm-btn').addEventListener('click', confirmLinkJira);

  // Allow closing dialog by clicking overlay background
  document.getElementById('link-jira-dialog').addEventListener('click', function(e) {
    if (e.target === this) closeDialog('link-jira-dialog');
  });
</script>
</body>
</html>
