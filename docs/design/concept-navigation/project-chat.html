<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat — Kabanchik</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-header-sub {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .chat-empty-icon {
      font-size: 48px;
      line-height: 1;
    }
    .chat-empty h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
      max-width: 340px;
    }
    .chat-empty p {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      max-width: 300px;
    }
    .msg-content {
      flex: 1;
      min-width: 0;
    }
    .msg-sources {
      margin-top: 8px;
    }
    .sources-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sources-toggle:hover {
      background: #f3f4f6;
      color: var(--text-primary);
    }
    .sources-toggle .chevron {
      font-size: 9px;
      transition: transform 0.15s;
    }
    .sources-toggle.open .chevron {
      transform: rotate(180deg);
    }
    .sources-list {
      display: none;
      margin-top: 6px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .sources-list.open {
      display: flex;
    }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .send-btn.stop {
      background: #ef4444;
    }
    .send-btn.stop:hover {
      background: #dc2626;
    }
    .typing-wrapper {
      display: flex;
      gap: 10px;
      max-width: 680px;
    }
    .msg-bubble strong {
      font-weight: 600;
    }
    .msg-bubble p {
      margin: 0 0 6px 0;
    }
    .msg-bubble p:last-child {
      margin-bottom: 0;
    }
    .msg-bubble ol, .msg-bubble ul {
      padding-left: 20px;
      margin: 4px 0;
    }
    .msg-bubble li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" style="display:flex;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <div class="chat-header-title">
          💬 Chat
          <span class="chat-header-sub">Ask about meetings, decisions &amp; action items</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearChat()" title="Clear conversation">Clear</button>
      </div>
      <div class="chat-layout" style="flex:1;min-height:0;">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <textarea
            class="chat-input"
            id="chat-input"
            placeholder="Ask me about your meetings, action items, or project decisions…"
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" title="Send message" disabled>→</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
    mountNav('chat');

    // ---- Mock conversation data ----
    const MOCK_CHAT = [
      {
        role: 'user',
        text: "What were the key decisions from yesterday's standup?"
      },
      {
        role: 'agent',
        text: "In yesterday's standup (Mar 26), the team made three key decisions:\n\n1. **Deploy auth fix immediately** — Bob's PLAT-234 fix is on staging and will be pushed to production after PR review, not waiting for the next release cycle.\n\n2. **Carol picks up Notion integration** after IT renews the API key (Alice is handling that).\n\n3. **Dashboard animation is TBD** — Dave and Eve's design review at 2pm determines if it's in scope for this sprint.",
        sources: [
          { type: 'meeting', title: 'Daily Standup Mar 26', time: '10:00' },
          { type: 'jira',    key: 'PLAT-234', title: 'Fix auth token expiry handling' },
          { type: 'notion',  title: 'Sprint 42 Notes' },
        ]
      },
      {
        role: 'user',
        text: 'Who is responsible for the metrics dashboard?'
      },
      {
        role: 'agent',
        text: '**Dave Park** is responsible for the metrics dashboard (PLAT-198). He picked it up yesterday and is doing a design review with **Eve Russo** today at 2pm. The prototype is expected by tomorrow (Mar 27).',
        sources: [
          { type: 'meeting', title: 'Daily Standup Mar 26', time: '10:02' },
          { type: 'jira',    key: 'PLAT-198', title: 'Metrics dashboard widget' },
        ]
      },
    ];

    const CANNED_RESPONSE = {
      text: "I found some relevant information in your recent meetings and Jira tickets. Based on the Sprint 42 standup notes, this topic was discussed on March 26. Would you like me to search for more specific details?",
      sources: [
        { type: 'meeting', title: 'Daily Standup Mar 26' }
      ]
    };

    let messages = [];
    let isTyping = false;

    // ---- Source chip helpers ----
    function sourceIcon(type) {
      if (type === 'meeting') return '📹';
      if (type === 'jira')    return '🔵';
      if (type === 'notion')  return '📋';
      return '📄';
    }

    function sourceLabel(src) {
      if (src.key) return `${src.key} · ${src.title}`;
      if (src.time) return `${src.title} · ${src.time}`;
      return src.title;
    }

    function renderSourceChips(sources) {
      return sources.map(s =>
        `<span class="source-chip">${sourceIcon(s.type)} ${sourceLabel(s)}</span>`
      ).join('');
    }

    // ---- Text → HTML (simple markdown) ----
    function msgToHtml(text) {
      // Bold
      let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // Numbered list lines
      const lines = html.split('\n');
      const out = [];
      let inList = false;
      for (const line of lines) {
        const numbered = line.match(/^(\d+)\.\s+(.*)/);
        if (numbered) {
          if (!inList) { out.push('<ol style="padding-left:18px;margin:6px 0">'); inList = true; }
          out.push(`<li style="margin-bottom:4px">${numbered[2]}</li>`);
        } else {
          if (inList) { out.push('</ol>'); inList = false; }
          if (line.trim() === '') {
            out.push('<br>');
          } else {
            out.push(`<p style="margin:0 0 4px">${line}</p>`);
          }
        }
      }
      if (inList) out.push('</ol>');
      return out.join('');
    }

    // ---- Render a single message element ----
    function buildMessageEl(msg) {
      const div = document.createElement('div');
      div.className = `chat-message ${msg.role}`;

      if (msg.role === 'user') {
        div.innerHTML = `
          <div class="msg-avatar">👤</div>
          <div class="msg-content">
            <div class="msg-bubble">${escapeHtml(msg.text)}</div>
          </div>
        `;
      } else {
        const hasSource = msg.sources && msg.sources.length > 0;
        const sourceId = 'src-' + Math.random().toString(36).slice(2, 9);
        div.innerHTML = `
          <div class="msg-avatar">🐗</div>
          <div class="msg-content">
            <div class="msg-bubble">${msgToHtml(msg.text)}</div>
            ${hasSource ? `
            <div class="msg-sources">
              <button class="sources-toggle" onclick="toggleSources(this, '${sourceId}')">
                Sources (${msg.sources.length}) <span class="chevron">▼</span>
              </button>
              <div class="sources-list" id="${sourceId}">
                ${renderSourceChips(msg.sources)}
              </div>
            </div>` : ''}
          </div>
        `;
      }
      return div;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function toggleSources(btn, listId) {
      btn.classList.toggle('open');
      const list = document.getElementById(listId);
      if (list) list.classList.toggle('open');
    }

    // ---- Render all messages ----
    function renderMessages() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <h2>Ask me about your meetings, action items, or project decisions</h2>
            <p>I can search across your meeting transcripts, Jira tickets, and Notion pages.</p>
          </div>
        `;
        return;
      }

      messages.forEach(msg => {
        container.appendChild(buildMessageEl(msg));
      });
      scrollToBottom();
    }

    function scrollToBottom() {
      const container = document.getElementById('chat-messages');
      container.scrollTop = container.scrollHeight;
    }

    // ---- Typing indicator ----
    function showTyping() {
      const container = document.getElementById('chat-messages');
      const wrap = document.createElement('div');
      wrap.className = 'typing-wrapper';
      wrap.id = 'typing-indicator';
      wrap.innerHTML = `
        <div class="msg-avatar">🐗</div>
        <div class="typing-indicator">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      `;
      container.appendChild(wrap);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // ---- Send logic ----
    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || isTyping) return;

      messages.push({ role: 'user', text });
      input.value = '';
      resizeInput(input);
      updateSendBtn();

      renderMessages();
      showTyping();
      isTyping = true;
      updateSendBtn();

      setTimeout(() => {
        hideTyping();
        messages.push({ role: 'agent', ...CANNED_RESPONSE });
        isTyping = false;
        renderMessages();
        updateSendBtn();
      }, 1500);
    }

    function stopResponse() {
      hideTyping();
      isTyping = false;
      messages.push({
        role: 'agent',
        text: 'Response stopped.',
        sources: []
      });
      renderMessages();
      updateSendBtn();
    }

    function clearChat() {
      messages = [];
      renderMessages();
    }

    function updateSendBtn() {
      const btn = document.getElementById('send-btn');
      const input = document.getElementById('chat-input');
      const hasText = input.value.trim().length > 0;

      if (isTyping) {
        btn.textContent = '■';
        btn.className = 'send-btn stop';
        btn.disabled = false;
        btn.title = 'Stop';
        btn.onclick = stopResponse;
      } else {
        btn.textContent = '→';
        btn.className = 'send-btn';
        btn.disabled = !hasText;
        btn.title = 'Send message';
        btn.onclick = sendMessage;
      }
    }

    function resizeInput(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    // ---- Wire up input ----
    const chatInput = document.getElementById('chat-input');

    chatInput.addEventListener('input', () => {
      resizeInput(chatInput);
      updateSendBtn();
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ---- Init ----
    messages = [...MOCK_CHAT];
    renderMessages();
    updateSendBtn();
  </script>
</body>
</html>
