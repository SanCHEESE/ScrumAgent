<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meetings — Kabanchik</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .meetings-count {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .meeting-title-cell {
      font-weight: 500;
      color: var(--text-primary);
    }
    .meeting-date {
      color: var(--text-primary);
    }
    .meeting-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .meeting-duration {
      color: var(--text-secondary);
      font-size: 12px;
    }
    .date-range-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .date-range-group input[type="date"] {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-primary);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      cursor: pointer;
      width: 130px;
    }
    .date-range-group input[type="date"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }
    .toolbar-filters {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    td.action-col {
      width: 80px;
    }
    tr.hidden-row {
      display: none;
    }
    .empty-row td {
      text-align: center;
      padding: 40px 16px;
    }
    .inline-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
    }
    .inline-empty .empty-icon {
      font-size: 28px;
    }
    .inline-empty p {
      font-size: 13px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="content-inner wide" style="padding:24px;">

        <div class="page-header">
          <div>
            <div class="page-title">Meetings</div>
            <div class="page-subtitle" id="meetings-count">All meetings for Platform Team</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="alert('Connect calendar to import meetings')">
            + Import Meeting
          </button>
        </div>

        <div class="toolbar">
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Search meetings…"
            oninput="applyFilters()"
          >

          <div class="filter-divider"></div>

          <div class="toolbar-filters" id="status-filters">
            <button class="filter-btn active" data-status="all"       onclick="setFilter(this)">All</button>
            <button class="filter-btn"        data-status="pending"   onclick="setFilter(this)">Pending</button>
            <button class="filter-btn"        data-status="processing"onclick="setFilter(this)">Processing</button>
            <button class="filter-btn"        data-status="done"      onclick="setFilter(this)">Done</button>
            <button class="filter-btn"        data-status="error"     onclick="setFilter(this)">Error</button>
          </div>

          <div class="filter-divider"></div>

          <div class="date-range-group">
            <span>From</span>
            <input type="date" id="date-from" onchange="applyFilters()">
            <span>to</span>
            <input type="date" id="date-to" onchange="applyFilters()">
          </div>
        </div>

        <div class="table-wrap">
          <table id="meetings-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Date &amp; Time</th>
                <th>Duration</th>
                <th>Participants</th>
                <th>Status</th>
                <th class="action-col">Action</th>
              </tr>
            </thead>
            <tbody id="meetings-tbody">
              <!-- Rows rendered by JS -->
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
    mountNav('meetings');

    let currentFilter = 'all';

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function setFilter(btn) {
      document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      applyFilters();
    }

    function applyFilters() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const dateFrom = document.getElementById('date-from').value;
      const dateTo   = document.getElementById('date-to').value;

      const tbody = document.getElementById('meetings-tbody');
      let visibleCount = 0;

      // Remove old empty row if present
      const oldEmpty = tbody.querySelector('.empty-row');
      if (oldEmpty) oldEmpty.remove();

      const rows = tbody.querySelectorAll('tr[data-id]');
      rows.forEach(row => {
        const title  = row.dataset.title.toLowerCase();
        const status = row.dataset.status;
        const date   = row.dataset.date; // YYYY-MM-DD

        const matchesSearch = !query || title.includes(query);
        const matchesStatus = currentFilter === 'all' || status === currentFilter;
        const matchesFrom   = !dateFrom || date >= dateFrom;
        const matchesTo     = !dateTo   || date <= dateTo;

        const visible = matchesSearch && matchesStatus && matchesFrom && matchesTo;
        row.classList.toggle('hidden-row', !visible);
        if (visible) visibleCount++;
      });

      // Show empty state if nothing matches
      if (visibleCount === 0) {
        const emptyRow = document.createElement('tr');
        emptyRow.className = 'empty-row';
        emptyRow.innerHTML = `
          <td colspan="6">
            <div class="inline-empty">
              <div class="empty-icon">📭</div>
              <p>No meetings match your filters.</p>
            </div>
          </td>
        `;
        tbody.appendChild(emptyRow);
      }

      // Update subtitle count
      const total = MOCK_MEETINGS.length;
      const countEl = document.getElementById('meetings-count');
      if (visibleCount === total && currentFilter === 'all' && !query && !dateFrom && !dateTo) {
        countEl.textContent = `${total} meeting${total !== 1 ? 's' : ''} for Platform Team`;
      } else {
        countEl.textContent = `Showing ${visibleCount} of ${total} meeting${total !== 1 ? 's' : ''}`;
      }
    }

    function renderTable() {
      const tbody = document.getElementById('meetings-tbody');
      tbody.innerHTML = MOCK_MEETINGS.map(m => {
        const avatarHtml = renderAvatarGroup(m.participants, 4);
        const badge = statusBadge(m.status);
        const dateFormatted = formatDate(m.date);

        return `
          <tr data-id="${m.id}" data-title="${m.title.toLowerCase()}" data-status="${m.status}" data-date="${m.date}">
            <td>
              <div class="meeting-title-cell">${m.title}</div>
            </td>
            <td>
              <div class="meeting-date">${dateFormatted}</div>
              <div class="meeting-time">${m.time}</div>
            </td>
            <td>
              <span class="meeting-duration">${m.duration}</span>
            </td>
            <td>${avatarHtml}</td>
            <td>${badge}</td>
            <td class="action-col">
              <a href="project-meeting-detail.html?id=${m.id}" class="btn btn-sm btn-secondary">View</a>
            </td>
          </tr>
        `;
      }).join('');

      applyFilters();
    }

    renderTable();
  </script>
</body>
</html>
